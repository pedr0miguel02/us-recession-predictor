# US Recession Predictor — configuração central
# Tudo o que muda comportamento do pipeline vive aqui, não espalhado pelo código.

data:
  start_date: "1970-01-01"
  # Frequência alvo do dataset. Séries diárias (spreads) são reamostradas para mensal.
  frequency: "MS"            # MS = month-start (convenção pandas)
  raw_path: "data/raw/series.parquet"
  processed_path: "data/processed/dataset.parquet"

# Séries FRED a recolher. A chave é o nome "amigável" usado no código;
# o valor é o ID oficial na FRED (https://fred.stlouisfed.org).
series:
  yield_10y2y:    "T10Y2Y"      # Spread 10Y-2Y (o preditor clássico)
  yield_10y3m:    "T10Y3M"      # Spread 10Y-3M (versão preferida da Fed de NY)
  unemployment:   "UNRATE"      # Taxa de desemprego (lagging mas robusto)
  industrial:     "INDPRO"      # Produção industrial (proxy leading; NAPM/PMI descontinuado na FRED)
  cpi:            "CPIAUCSL"     # CPI (inflação)
  fed_funds:      "FEDFUNDS"     # Fed Funds Rate
  m2:             "M2SL"         # Oferta monetária M2
  consumer_sent:  "UMCSENT"      # Confiança do consumidor (Univ. Michigan)

# Série do alvo: indicador de recessão NBER (1 = recessão, 0 = expansão)
target_series: "USREC"

target:
  # O label de hoje = "haverá recessão dentro de N meses?".
  # Conseguido deslocando USREC para trás N meses (shift negativo).
  lag_months: 12

# Engenharia de features: que séries são transformadas em variação % anual (YoY).
# Níveis brutos de CPI/M2 não são estacionários; a variação é o sinal útil.
features:
  yoy_pct_change: ["cpi", "m2", "industrial"]
  # As restantes (spreads, taxas, desemprego, sentimento) entram em nível.

models:
  random_state: 42
  walk_forward:
    min_train_months: 180      # ~15 anos de dados antes da primeira previsão
    step_months: 1             # avança a janela mês a mês
  logistic:
    max_iter: 1000
  random_forest:
    n_estimators: 400
    max_depth: 5
  xgboost:
    n_estimators: 400
    max_depth: 3
    learning_rate: 0.05

reports:
  figures_dir: "reports/figures"
